<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UMPC Control Panel Widget</title>
  <style>
    :root {
      font-size: clamp(15px, 1.1vw + 0.45rem, 19px);
      --gap: 0.75rem;
      --radius: 0.5rem;
      --panel-bg: rgba(20, 20, 24, 0.72);
      --panel-border: rgba(255, 255, 255, 0.1);
      --btn-bg: rgba(70, 70, 76, 0.55);
      --btn-bg-active: rgba(98, 98, 108, 0.7);
      --btn-text: #f7f8fb;
      --capture-bg: rgba(40, 120, 210, 0.28);
      --capture-bg-active: rgba(70, 145, 230, 0.42);
      --quit-bg: rgba(110, 28, 35, 0.5);
      --quit-border: rgba(255, 94, 107, 0.65);
      --quit-bg-active: rgba(138, 38, 49, 0.72);
      --focus: rgba(126, 196, 255, 0.7);
      --btn-min-h: 4.5rem;
      --btn-font: 0.96rem;
      --btn-pad-y: 0.9rem;
      --btn-pad-x: 0.75rem;
      --row-gap-2: 1.5rem;
      --capture-icon: 2.0625rem;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: "Segoe UI", "Noto Sans KR", system-ui, sans-serif;
      color: var(--btn-text);
      background: transparent;
    }

    .widget {
      width: min(100%, 30rem);
      margin: 0 auto;
      padding: 0.95rem;
      border-radius: 0.8rem;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(16px) saturate(120%);
      -webkit-backdrop-filter: blur(16px) saturate(120%);
      box-shadow: 0 0.5rem 1.5rem rgba(0, 0, 0, 0.34);
    }

    .row {
      display: flex;
      gap: var(--gap);
    }

    .row + .row {
      margin-top: var(--row-gap-2);
    }

    .btn {
      position: relative;
      flex: 1;
      min-height: var(--btn-min-h);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: var(--radius);
      background: var(--btn-bg);
      color: var(--btn-text);
      padding: var(--btn-pad-y) var(--btn-pad-x);
      font-size: var(--btn-font);
      font-weight: 600;
      letter-spacing: 0.01em;
      line-height: 1.15;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      touch-action: manipulation;
      cursor: pointer;
      transition: transform 120ms ease, background-color 120ms ease, border-color 120ms ease;
      overflow: hidden;
    }

    .btn:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }

    .btn:active,
    .btn.is-pressed {
      transform: scale(0.95);
      background: var(--btn-bg-active);
    }

    .btn.capture {
      background: var(--capture-bg);
      border-color: rgba(127, 185, 255, 0.4);
      gap: 0.4rem;
    }

    .btn.capture .capture-icon {
      width: var(--capture-icon);
      height: var(--capture-icon);
      image-rendering: pixelated;
      flex: 0 0 auto;
    }

    .btn.capture:active,
    .btn.capture.is-pressed {
      background: var(--capture-bg-active);
    }

    .btn.quit {
      background: var(--quit-bg);
      border-color: var(--quit-border);
    }

    .btn.quit:active,
    .btn.quit.is-pressed,
    .btn.quit.holding {
      background: var(--quit-bg-active);
    }

    .btn.quit .progress {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 0%;
      height: 0.2rem;
      background: rgba(255, 130, 140, 0.9);
      transition: width 80ms linear;
      pointer-events: none;
    }

    .btn.quit.ready .progress {
      width: 100%;
    }

    @media (max-width: 480px) {
      .widget {
        width: 100%;
        border-radius: 0.65rem;
      }
      .btn {
        font-size: 0.92rem;
      }
    }

    /* DPI tuning for 8-inch 1920x1200 target (125/150/175/200%) */
    html[data-dpr^="1.25"] {
      --btn-min-h: 4.2rem;
      --btn-font: 0.93rem;
      --btn-pad-y: 0.82rem;
      --row-gap-2: 1.25rem;
      --capture-icon: 1.9rem;
    }

    html[data-dpr^="1.50"] {
      --btn-min-h: 4.5rem;
      --btn-font: 0.96rem;
      --btn-pad-y: 0.9rem;
      --row-gap-2: 1.5rem;
      --capture-icon: 2.06rem;
    }

    html[data-dpr^="1.75"] {
      --btn-min-h: 4.85rem;
      --btn-font: 1rem;
      --btn-pad-y: 0.98rem;
      --row-gap-2: 1.6rem;
      --capture-icon: 2.22rem;
    }

    html[data-dpr^="2.00"] {
      --btn-min-h: 5.2rem;
      --btn-font: 1.05rem;
      --btn-pad-y: 1.05rem;
      --row-gap-2: 1.75rem;
      --capture-icon: 2.4rem;
    }
          .btn small {
      font-size: 0.64em;
      opacity: 0.9;
      font-weight: 500;
    }

    .btn.insert-btn {
      flex-direction: column;
      gap: 0.12rem;
    }

</style>
</head>
<body>
  <main class="widget" aria-label="UMPC quick control panel">
    <section class="row" aria-label="navigation controls">
      <button class="btn insert-btn" data-key="Insert" type="button">
        <span>Insert</span>
        <small>(OptiScaler Overlay)</small>
      </button>
      <button class="btn" data-key="Home" type="button">HOME</button>
      <button class="btn" data-key="End" type="button">END</button>
    </section>

    <section class="row" aria-label="system controls">
      <button class="btn capture" id="captureBtn" type="button" data-combo="Ctrl+Alt+S" aria-label="Lossless Scaling">
        <img class="capture-icon" src="assets/LSFG.png" alt="" aria-hidden="true" />
        <span>Lossless Scaling<br><small>(Ctrl+Alt+S)</small></span>
      </button>

      <button class="btn quit" id="quitBtn" type="button" aria-label="Hold to trigger Alt+F4">
        <span class="label">Hold to Force Quit</span>
        <span class="progress" aria-hidden="true"></span>
      </button>
    </section>

    <p id="webStatus" style="margin:0.9rem 0 0; font-size:0.72rem; opacity:0.72;">Web ready</p>
  </main>

  <script>
    const HOLD_MS = 1500;

    const pressButtons = document.querySelectorAll('.btn[data-key]');
    const captureBtn = document.getElementById('captureBtn');
    const quitBtn = document.getElementById('quitBtn');
    const quitLabel = quitBtn.querySelector('.label');
    const quitProgress = quitBtn.querySelector('.progress');
    const webStatus = document.getElementById('webStatus');

    let holdTimer = null;
    let holdStart = 0;
    let progressTimer = null;
    let holdTriggered = false;

    function notifyHost(action) {
      webStatus.textContent = `Click: ${action}`;

      try {
        document.title = `cmd:${action}:${Date.now()}`;
        webStatus.textContent = `Title sent: ${action}`;
        return true;
      } catch (error) {
        webStatus.textContent = `Bridge error: ${error.message || error}`;
        console.log('Bridge failed:', error);
      }

      webStatus.textContent = `Title bridge unavailable: ${action}`;
      return false;
    }

    function triggerKeyEvent(keyName) {
      const map = { Insert: 'insert', Home: 'home', End: 'end' };
      const action = map[keyName] || '';
      if (!action || !notifyHost(action)) {
        console.log('Fallback key trigger:', keyName);
      }
    }

    function triggerKeyCombo(combo) {
      const map = { 'Ctrl+Alt+S': 'capture', 'Alt+F4': 'quit' };
      const action = map[combo] || '';
      if (!action || !notifyHost(action)) {
        console.log('Fallback combo trigger:', combo);
      }
    }

    function syncDprClass() {
      const dpr = window.devicePixelRatio || 1;
      document.documentElement.dataset.dpr = dpr.toFixed(2);
    }

    function setupTapFeedback(button) {
      button.addEventListener('pointerdown', () => button.classList.add('is-pressed'));
      const clear = () => button.classList.remove('is-pressed');
      button.addEventListener('pointerup', clear);
      button.addEventListener('pointercancel', clear);
      button.addEventListener('pointerleave', clear);
    }

    pressButtons.forEach((button) => {
      setupTapFeedback(button);
      button.addEventListener('click', () => triggerKeyEvent(button.dataset.key));
    });

    setupTapFeedback(captureBtn);
    captureBtn.addEventListener('click', () => triggerKeyCombo('Ctrl+Alt+S'));

    function resetQuitState() {
      clearTimeout(holdTimer);
      clearInterval(progressTimer);
      holdTimer = null;
      progressTimer = null;
      holdStart = 0;
      holdTriggered = false;
      quitBtn.classList.remove('holding', 'ready', 'is-pressed');
      quitProgress.style.width = '0%';
      quitLabel.textContent = 'Hold to Force Quit';
    }

    function startQuitHold() {
      if (holdTimer || holdTriggered) return;

      quitBtn.classList.add('holding', 'is-pressed');
      quitLabel.textContent = 'Holding...';
      holdStart = performance.now();

      progressTimer = setInterval(() => {
        const elapsed = performance.now() - holdStart;
        const ratio = Math.min(elapsed / HOLD_MS, 1);
        quitProgress.style.width = `${(ratio * 100).toFixed(2)}%`;
      }, 16);

      holdTimer = setTimeout(() => {
        holdTriggered = true;
        quitBtn.classList.add('ready');
        quitLabel.textContent = 'Quitting...';
        triggerKeyCombo('Alt+F4');
        setTimeout(resetQuitState, 280);
      }, HOLD_MS);
    }

    function cancelQuitHold() {
      if (!holdTriggered) {
        resetQuitState();
      }
    }

    quitBtn.addEventListener('pointerdown', (event) => {
      event.preventDefault();
      startQuitHold();
    });

    ['pointerup', 'pointercancel', 'pointerleave'].forEach((eventName) => {
      quitBtn.addEventListener(eventName, cancelQuitHold);
    });

    function notifyWidgetReady() {
      try {
        if (window.external && typeof window.external.notify === 'function') {
          window.external.notify('XboxGameBarWidgetReady');
        }
      } catch (error) {
        console.log('Ready notify skipped:', error);
      }
    }

    window.addEventListener('resize', syncDprClass);
    var mq = window.matchMedia('(resolution: 2dppx)');
    if (mq) {
      if (typeof mq.addEventListener === 'function') {
        mq.addEventListener('change', syncDprClass);
      } else if (typeof mq.addListener === 'function') {
        mq.addListener(syncDprClass);
      }
    }
    syncDprClass();
    notifyWidgetReady();
  </script>
</body>
</html>
