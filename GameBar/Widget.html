<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Easy Shortcut for UMPC</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: "Segoe UI", sans-serif;
      background: #1f232b;
      color: #ffffff;
    }
    .wrap {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
    }
    .badge {
      background: #2f6db2;
      border: 1px solid #6ea7e6;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 20px;
      font-weight: 700;
    }
    .sub {
      font-size: 14px;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="badge">WIDGET HTML LOADED</div>
    <div class="sub">Easy Shortcut for UMPC</div>
  </div>
</body>
</html>
